---
name: PR

on:
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

env:
  CI: true

jobs:
  lint:
    name: Lint
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test:
    name: Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v6
        with:
          version: 11.13.1
          cache: true
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:check
